name: PitchTracker
options:
  bundleIdPrefix: com.vip
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_NSCameraUsageDescription: "Camera tracks pitch location and ball flight for velocity and strike zone analysis."
    INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "Save pitch clips to your photo library."
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
targets:
  PitchTracker:
    type: application
    platform: iOS
    sources:
      - PitchTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vip.pitchtracker
        MARKETING_VERSION: "1.0.3"
        CURRENT_PROJECT_VERSION: "4"
        GENERATE_INFOPLIST_FILE: YES
    info:
      path: PitchTracker/Info.plist
      properties:
        CFBundleDisplayName: Pitch Tracker
        UILaunchScreen: {}
        UIRequiresFullScreen: true
