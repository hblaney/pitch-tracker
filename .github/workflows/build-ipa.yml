name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -runFirstLaunch || true
          xcodebuild -downloadPlatform iOS || true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build archive
        run: |
          xcodebuild -project PitchTracker.xcodeproj -scheme PitchTracker \
            -configuration Release -archivePath build/PitchTracker.xcarchive \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS=NO \
            archive

      - name: Package unsigned IPA
        run: |
          APP="build/PitchTracker.xcarchive/Products/Applications/PitchTracker.app"
          test -d "$APP"
          mkdir -p build/Payload
          cp -r "$APP" build/Payload/
          cd build && zip -r PitchTracker-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PitchTracker-ipa
          path: build/PitchTracker-unsigned.ipa
